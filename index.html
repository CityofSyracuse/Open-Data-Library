<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syracuse Open Data Datasets</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background-color: white;
        padding: 20px;
        color: #062858;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
      }

      h1 {
        color: #062858;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }

      .filter-wrapper {
        flex: 1;
        min-width: 250px;
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-box,
      .filter-select {
        flex: 1;
        min-width: 250px;
        padding: 12px 15px;
        border: 2px solid #c1cad6;
        border-radius: 6px;
        font-size: 16px;
        color: #062858;
        background-color: white;
        transition: border-color 0.3s;
      }

      .filter-select {
        padding-right: 45px;
      }

      .search-box:focus,
      .filter-select:focus {
        outline: none;
        border-color: #062858;
      }

      .filter-select {
        cursor: pointer;
      }

      .clear-tag-btn {
        position: absolute;
        right: 35px;
        background-color: transparent;
        color: #062858;
        border: none;
        width: 24px;
        height: 24px;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.3s;
        padding: 0;
        line-height: 1;
      }

      .clear-tag-btn:hover {
        color: #0a3670;
      }

      .clear-tag-btn:active {
        color: #041d3a;
      }

      .loading {
        text-align: center;
        padding: 40px;
        font-size: 18px;
        color: #062858;
      }

      .error {
        background-color: #fff3cd;
        border: 1px solid #ffc107;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        color: #856404;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      thead {
        background-color: #062858;
        color: white;
      }

      th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        position: relative;
      }

      th:hover {
        background-color: #0a3670;
      }

      th.sortable::after {
        content: " ⇅";
        opacity: 0.5;
        font-size: 12px;
      }

      th.sort-asc::after {
        content: " ▲";
        opacity: 1;
      }

      th.sort-desc::after {
        content: " ▼";
        opacity: 1;
      }

      td {
        padding: 15px;
        border-bottom: 1px solid #c1cad6;
      }

      tbody tr {
        transition: background-color 0.2s;
      }

      tbody tr:hover {
        background-color: #f8f9fa;
      }

      a {
        color: #062858;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      a:hover {
        color: #0a3670;
        text-decoration: underline;
      }

      .no-results {
        text-align: center;
        padding: 40px;
        color: #666;
        font-style: italic;
      }

      .count {
        color: #666;
        font-size: 14px;
        margin-top: 10px;
      }

      .mobile-sort-buttons {
        display: none;
        gap: 10px;
        margin-bottom: 15px;
      }

      .sort-btn {
        flex: 1;
        padding: 12px 15px;
        background-color: #062858;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .sort-btn:hover {
        background-color: #0a3670;
      }

      .sort-btn:active {
        background-color: #041d3a;
      }

      .sort-btn::after {
        content: " ⇅";
        opacity: 0.5;
        font-size: 12px;
      }

      .sort-btn.sort-asc::after {
        content: " ▲";
        opacity: 1;
      }

      .sort-btn.sort-desc::after {
        content: " ▼";
        opacity: 1;
      }

      /* Mobile Responsive Styles */
      @media screen and (max-width: 768px) {
        body {
          padding: 10px;
        }

        .container {
          padding: 20px;
        }

        h1 {
          font-size: 22px;
          margin-bottom: 20px;
        }

        .controls {
          flex-direction: column;
          gap: 10px;
        }

        .filter-wrapper {
          min-width: 100%;
          width: 100%;
        }

        .search-box,
        .filter-select {
          min-width: 100%;
          width: 100%;
        }

        .mobile-sort-buttons {
          display: flex;
        }

        /* Responsive table */
        table {
          font-size: 14px;
        }

        thead {
          display: none;
        }

        tbody tr {
          display: block;
          margin-bottom: 15px;
          border: 2px solid #d4d4d4;
          padding: 15px;
          background-color: #fef3cd;
          border-radius: 10px;
        }

        tbody tr:hover {
          background-color: #fef3cd;
        }

        td {
          display: block;
          padding: 8px 0;
          border: none;
          text-align: left;
        }

        td::before {
          content: attr(data-label);
          font-weight: 600;
          color: #062858;
          display: block;
          margin-bottom: 5px;
        }

        td:first-child {
          padding-top: 0;
        }

        td:first-child::before {
          display: none;
        }

        td:first-child a {
          text-decoration: underline;
        }

        td:last-child {
          padding-bottom: 0;
        }
      }

      @media screen and (max-width: 480px) {
        .container {
          padding: 15px;
        }

        h1 {
          font-size: 20px;
        }

        .search-box,
        .filter-select {
          font-size: 14px;
          padding: 10px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Syracuse Open Data Datasets</h1>

      <div class="controls">
        <label for="searchBox" class="sr-only">Search datasets by name</label>
        <input
          type="text"
          id="searchBox"
          class="search-box"
          placeholder="Search datasets by name..."
        />

        <div class="filter-wrapper">
          <!-- Category filter based on item.groupCategories -->
          <label for="categoryFilter" class="sr-only"
            >Filter datasets by category</label
          >
          <select id="categoryFilter" class="filter-select">
            <option value="">All Categories</option>
          </select>
          <button
            id="clearCategoryBtn"
            class="clear-tag-btn"
            style="display: none"
            title="Clear category filter"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>

        <div class="filter-wrapper">
          <!-- Year filter based on Date Updated / modified -->
          <label for="yearFilter" class="sr-only"
            >Filter datasets by year published</label
          >
          <select id="yearFilter" class="filter-select">
            <option value="">Year Published</option>
          </select>
        </div>
      </div>

      <div id="mobileSortButtons" class="mobile-sort-buttons">
        <button id="sortAlphaBtn" class="sort-btn">Sort Alphabetically</button>
        <button id="sortDateBtn" class="sort-btn">Sort by Date Updated</button>
      </div>

      <div id="loadingMessage" class="loading">Loading datasets...</div>
      <div id="errorMessage" class="error" style="display: none"></div>
      <div id="countMessage" class="count" style="display: none"></div>

      <table id="dataTable" style="display: none">
        <thead>
          <tr>
            <th class="sortable" data-column="title">Dataset Title</th>
            <th class="sortable" data-column="created">Date Published</th>
            <th class="sortable" data-column="modified">Date Updated</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div id="noResults" class="no-results" style="display: none">
        No datasets found matching your criteria.
      </div>
    </div>

    <script>
      let allDatasets = [];
      let filteredDatasets = [];
      let currentSort = { column: null, direction: "asc" };

      function cleanGroupCategory(cat) {
        if (!cat) return "";
        // "/Categories/Infrastructure"
        const stripped = cat.replace(/^\/?Categories\//i, "");
        const parts = stripped.split("/").filter(Boolean);
        return parts.length ? parts[parts.length - 1] : stripped;
      }

      // Fetch
      async function fetchDatasets() {
        try {
          let allResults = [];
          let start = 1;
          let hasMore = true;
          const num = 100; // Results per page

          // Loop through all pages
          while (hasMore) {
            const response = await fetch(
              `https://www.arcgis.com/sharing/rest/content/groups/af5799e7f6d84c5a944b053a47e18121/search?f=json&num=${num}&start=${start}`,
            );

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            if (data.results && data.results.length > 0) {
              allResults = allResults.concat(data.results);

              // Check if there are more results
              const nextStart = data.nextStart;
              if (nextStart && nextStart > 0) {
                start = nextStart;
              } else {
                hasMore = false;
              }
            } else {
              hasMore = false;
            }
          }

          if (allResults.length > 0) {
            allDatasets = allResults.map((item) => {
              const categories = (item.groupCategories || [])
                .map(cleanGroupCategory)
                .filter(Boolean);

              return {
                id: item.id,
                title: item.title,
                created: item.created,
                modified: item.modified,
                modifiedYear: new Date(item.created).getFullYear(),
                url: `https://data.syr.gov/datasets/${item.id}/about`,
                categories: categories,
              };
            });

            populateCategoryFilter();
            populateYearFilter();

            filteredDatasets = [...allDatasets];
            renderTable();

            document.getElementById("loadingMessage").style.display = "none";
            document.getElementById("dataTable").style.display = "table";
            updateCount();
          } else {
            throw new Error("No datasets found in the response");
          }
        } catch (error) {
          console.error("Error fetching datasets:", error);
          document.getElementById("loadingMessage").style.display = "none";
          document.getElementById("errorMessage").textContent =
            `Error loading datasets: ${error.message}`;
          document.getElementById("errorMessage").style.display = "block";
        }
      }

      // Convert Unix timestamp (milliseconds) to readable date
      function formatDate(timestamp) {
        const date = new Date(timestamp);
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const year = date.getFullYear();
        return `${month}/${day}/${year}`;
      }

      // Populate category filter dropdown (from item.groupCategories)
      function populateCategoryFilter() {
        const categorySet = new Set();
        allDatasets.forEach((dataset) => {
          dataset.categories.forEach((c) => categorySet.add(c));
        });

        const categoryFilter = document.getElementById("categoryFilter");
        const sortedCategories = Array.from(categorySet).sort((a, b) =>
          a.localeCompare(b),
        );

        sortedCategories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          categoryFilter.appendChild(option);
        });
      }

      // Year filter dropdown based on Date Updated / modified
      function populateYearFilter() {
        const yearSet = new Set();
        allDatasets.forEach((dataset) => {
          if (Number.isFinite(dataset.modifiedYear)) {
            yearSet.add(dataset.modifiedYear);
          }
        });

        const yearFilter = document.getElementById("yearFilter");
        const sortedYears = Array.from(yearSet).sort((a, b) => b - a);

        sortedYears.forEach((year) => {
          const option = document.createElement("option");
          option.value = String(year);
          option.textContent = String(year);
          yearFilter.appendChild(option);
        });
      }

      // Datasets based on search, category, and year
      function filterDatasets() {
        const searchTerm = document
          .getElementById("searchBox")
          .value.toLowerCase();
        const selectedCategory =
          document.getElementById("categoryFilter").value;
        const selectedYear = document.getElementById("yearFilter").value;
        const clearBtn = document.getElementById("clearCategoryBtn");

        // Show/hide clear button based on category selection
        if (selectedCategory) {
          clearBtn.style.display = "flex";
        } else {
          clearBtn.style.display = "none";
        }

        filteredDatasets = allDatasets.filter((dataset) => {
          const matchesSearch = dataset.title
            .toLowerCase()
            .includes(searchTerm);
          const matchesCategory =
            selectedCategory === "" ||
            dataset.categories.includes(selectedCategory);
          const matchesYear =
            selectedYear === "" ||
            dataset.modifiedYear === Number(selectedYear);
          return matchesSearch && matchesCategory && matchesYear;
        });

        renderTable();
        updateCount();
      }

      // Sort datasets
      function sortDatasets(column) {
        if (currentSort.column === column) {
          currentSort.direction =
            currentSort.direction === "asc" ? "desc" : "asc";
        } else {
          currentSort.column = column;
          currentSort.direction = "asc";
        }

        filteredDatasets.sort((a, b) => {
          let aVal, bVal;

          if (column === "title") {
            aVal = a.title.toLowerCase();
            bVal = b.title.toLowerCase();
          } else if (column === "modified") {
            aVal = a.modified;
            bVal = b.modified;
          } else if (column === "created") {
            aVal = a.created;
            bVal = b.created;
          }

          if (aVal < bVal) return currentSort.direction === "asc" ? -1 : 1;
          if (aVal > bVal) return currentSort.direction === "asc" ? 1 : -1;
          return 0;
        });

        updateSortIndicators(column);
        renderTable();
      }

      // Update sort indicators in table headers and mobile buttons
      function updateSortIndicators(column) {
        // Update table headers
        document.querySelectorAll("th.sortable").forEach((th) => {
          th.classList.remove("sort-asc", "sort-desc");
          if (th.dataset.column === column) {
            th.classList.add(
              currentSort.direction === "asc" ? "sort-asc" : "sort-desc",
            );
          }
        });

        // Update mobile buttons
        const alphaBtn = document.getElementById("sortAlphaBtn");
        const dateBtn = document.getElementById("sortDateBtn");

        alphaBtn.classList.remove("sort-asc", "sort-desc");
        dateBtn.classList.remove("sort-asc", "sort-desc");

        if (column === "title") {
          alphaBtn.classList.add(
            currentSort.direction === "asc" ? "sort-asc" : "sort-desc",
          );
        } else if (column === "modified") {
          dateBtn.classList.add(
            currentSort.direction === "asc" ? "sort-asc" : "sort-desc",
          );
        }
      }

      // Render table with filtered datasets
      function renderTable() {
        const tbody = document.getElementById("tableBody");
        const noResults = document.getElementById("noResults");
        const table = document.getElementById("dataTable");

        tbody.innerHTML = "";

        if (filteredDatasets.length === 0) {
          table.style.display = "none";
          noResults.style.display = "block";
          return;
        }

        table.style.display = "table";
        noResults.style.display = "none";

        filteredDatasets.forEach((dataset) => {
          const row = document.createElement("tr");

          const titleCell = document.createElement("td");
          titleCell.setAttribute("data-label", "Dataset Title");
          const link = document.createElement("a");
          link.href = dataset.url;
          link.textContent = dataset.title;
          link.target = "_blank";
          titleCell.appendChild(link);

          const createdCell = document.createElement("td");
          createdCell.setAttribute("data-label", "Date Published");
          createdCell.textContent = formatDate(dataset.created);

          const dateCell = document.createElement("td");
          dateCell.setAttribute("data-label", "Date Updated");
          dateCell.textContent = formatDate(dataset.modified);

          row.appendChild(titleCell);
          row.appendChild(createdCell);
          row.appendChild(dateCell);
          tbody.appendChild(row);
        });
      }

      // Update count message
      function updateCount() {
        const countMessage = document.getElementById("countMessage");
        countMessage.textContent = `Showing ${filteredDatasets.length} of ${allDatasets.length} datasets`;
        countMessage.style.display = "block";
      }

      // Event listeners
      document
        .getElementById("searchBox")
        .addEventListener("input", filterDatasets);
      document
        .getElementById("categoryFilter")
        .addEventListener("change", filterDatasets);
      document
        .getElementById("yearFilter")
        .addEventListener("change", filterDatasets);

      document
        .getElementById("clearCategoryBtn")
        .addEventListener("click", () => {
          document.getElementById("categoryFilter").value = "";
          filterDatasets();
        });

      document.querySelectorAll("th.sortable").forEach((th) => {
        th.addEventListener("click", () => {
          sortDatasets(th.dataset.column);
        });
      });

      // Mobile sort buttons
      document.getElementById("sortAlphaBtn").addEventListener("click", () => {
        sortDatasets("title");
      });

      document.getElementById("sortDateBtn").addEventListener("click", () => {
        sortDatasets("modified");
      });

      // Initialize
      fetchDatasets();
    </script>
  </body>
</html>
